<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 💜</title>
<link rel="icon" type="img3.jpg" href="img3.jpg">
<style>
body {
    margin: 0;
    background: #6b21a8;
    font-family: Arial;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* SIDE TEXT */
.sideText {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 55px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 10px #fff, 0 0 20px #fff;
}

#leftText { left: 10%; }
#rightText { right: 2%; }

/* FRAME */
#photoBox {
    background: white;
    padding: 50px 15px 15px 15px; /* 🔥 reduced bottom space */
    border-radius: 16px;
    text-align: center;

    box-shadow: 0 0 25px #fff;
}

/* IMAGE */
#img {
    width: 90vw;
    max-width: 340px;
    border-radius: 10px;
}

/* NAME */
#name {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
    color: black;
    cursor: pointer;
}

/* CLICK */
#clickBox {
    margin-top: 5px;
    font-size: 16px;
    color: black;
    cursor: pointer;
}
</style>

</head>

<body>

<div id="leftText" class="sideText">HAPPY</div>
<div id="rightText" class="sideText">BIRTHDAY</div>

<div id="photoBox">
    <img id="img" src="img.jpg">
    
    <div id="name" onclick="goNext()">Rapunzel❤️</div>
    
    <div id="clickBox" onclick="goNext()">
        CLICK 👆🏻
    </div>
</div>

<script>
function goNext() {
    window.location.href = "final.html";
}
</script>

</body>
</html>
