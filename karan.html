<!DOCTYPE html>
<html>
<head>
  <title>Special For You ❤️</title>
<link rel="icon" type="img5.jpg" href="img5.jpg">
  <style>
    body {
      text-align: center;
      font-family: cursive;
      background: linear-gradient(to bottom, #ffcccc, #800000);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Top Frame */
    .top-frame {
      position: relative;
      width: 90%;
      height: 300px;
      margin: 20px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 10px black;
    }

    .top-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
    }

    .top-frame #text {
      position: absolute;
      top: 20px;
      left: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
    }

    .top-frame audio {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: calc(100% - 20px);
    }

    /* Second Message */
    #text2 {
      font-size: 20px;
      width: 90%;
      margin: 15px auto;
      line-height: 1.6;
      text-shadow: 2px 2px 5px black;
    }

    /* Bottom Frame (final message) */
    .bottom-frame {
      position: relative;
      width: 90%;
      min-height: 500px;  /* Increased height to merge middle image space */
      margin: 30px auto;
      border-radius: 15px;
      background: rgba(255, 102, 102, 0.8);
      box-shadow: 0 0 10px black;
      padding: 15px;
      overflow-y: auto; /* scroll if message is long */
      transition: height 0.3s ease;
    }

    #finalText {
      font-size: 22px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
      color: white;
      line-height: 1.5;
      transition: font-size 0.5s ease, text-shadow 0.5s ease;
    }

    /* Glowing animation for final text */
    .glow {
      animation: glowEffect 1s ease-in-out infinite alternate;
    }

    @keyframes glowEffect {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff99cc, 0 0 20px #ff6666; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff3333; }
      100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff99cc, 0 0 45px #ff0000; }
    }

    /* Next Button */
    .next-btn {
      margin: 20px auto;
      padding: 15px 30px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff6666, #ff0000);
      color: white;
      box-shadow: 2px 2px 8px black;
      transition: transform 0.2s, box-shadow 0.2s;
    }

  
  </style>
</head>

<body>

  <h1>❤️For You❤️</h1>

  <!-- Top Frame -->
  <div class="top-frame">
    <img src="img1.jpg" alt="Top Image">
    <p id="text"></p>
    <audio controls autoplay>
      <source src="audio.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- Second Message -->
  <p id="text2"></p>

  <!-- Bottom Frame (final message) -->
  <div class="bottom-frame">
    <p id="finalText"></p>
  </div>

  
  

  <script>
    let msg1 = "Hey... unakaga dhaan indha message ❤️ Unna enaku romba pudikkum pa...";
    let msg2 = "I don’t know when it started…but somewhere between random days and ordinary momentsyou quietly became something I can’t ignore anymore"
    let msg3 = "Some people don’t need a special place in life…because somehow, they become the reason everything else feels different"
    let i = 0, j = 0, k = 0;
    const finalFrame = document.getElementById("finalText");
    const bottomFrame = document.querySelector(".bottom-frame");

    function typeFirst() {
      if (i < msg1.length) {
        document.getElementById("text").innerHTML += msg1.charAt(i);
        i++;
        setTimeout(typeFirst, 40);
      } else {
        setTimeout(typeSecond, 500);
      }
    }

    function typeSecond() {
      if (j < msg2.length) {
        document.getElementById("text2").innerHTML += msg2.charAt(j);
        j++;
        setTimeout(typeSecond, 40);
      } else {
        setTimeout(typeFinal, 500);
      }
    }

    function typeFinal() {
      if (k < msg3.length) {
        finalFrame.innerHTML += msg3.charAt(k);
        k++;
        bottomFrame.style.height = finalFrame.scrollHeight + 30 + "px";

        if (k === msg3.length) {
          finalFrame.style.fontSize = "28px";
          finalFrame.classList.add("glow");
        }

        setTimeout(typeFinal, 35);
      }
    }

    typeFirst();

    
  </script>

</body>
</html>
